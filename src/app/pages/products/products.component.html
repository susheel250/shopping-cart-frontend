<div class="products-container">
  <div class="product-card" *ngFor="let product of products">
    <img
      *ngIf="product.image"
      [src]="'http://localhost:5000/uploads/' + product.image"
      width="200"
      height="200"
    />

    <h2>
      {{ product.name }}
    </h2>

     <p class="price">
      ₹ {{ product.price }}
    </p>

    <p>
      {{ product.description }}
    </p>

    <button (click)="addToCart(product.id)">Add To Cart</button>
  </div>
</div>
