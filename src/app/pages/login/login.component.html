<div class="login-container">

  <h1>Login Page</h1>

  <input
    type="email"
    placeholder="Enter Email"
    [(ngModel)]="email"
  >

  <br><br>

  <input
    type="password"
    placeholder="Enter Password"
    [(ngModel)]="password"
  >

  <br><br>

  <button (click)="login()">
    Login
  </button>

</div>
