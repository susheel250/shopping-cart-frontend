<div
  class="product-detail"
  *ngIf="product"
>

  <div class="product-image">

    <img
      [src]="getImageUrl(product.image)"
      [alt]="product.name"
    >

  </div>

  <div class="product-info">

    <h1>{{ product.name }}</h1>

    <h2>
      ₹ {{ product.price }}
    </h2>

    <p>
      {{ product.description }}
    </p>

    <button>
      Add To Cart
    </button>

  </div>

</div>
